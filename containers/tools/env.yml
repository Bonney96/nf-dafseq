name: base
channels:
  - conda-forge
  - bioconda
dependencies:
  # --- step 1 (MINIMAP_ALIGN) ---
  - minimap2=2.30
  - samtools=1.22.1
  # --- steps 3 & 4 (MARK_DUPLICATES, PHASE_READS) python deps ---
  # Our bin/ scripts are validated on pandas 2.x (NOT the pandas==1.4 that the
  # DAF-QC-SMK Snakemake pins internally — that lives in the separate dafqc image).
  - python=3.11
  - pysam=0.23.3
  - pandas=2.2
  - numpy
  - scipy
  - scikit-learn
  - matplotlib=3.10.3
  - seaborn
  # phase_reads_del.py shells out to bedGraphToBigWig
  - ucsc-bedgraphtobigwig
